minimum_prek_version = "0.3.6"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "go-lint"
name = "Go lint"
language = "system"
entry = "make lint"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "mdformat"
name = "mdformat"
language = "system"
entry = "uvx --from mdformat==0.7.22 --with mdformat-tables==1.0.0 mdformat --wrap 80"
types = ["markdown"]
